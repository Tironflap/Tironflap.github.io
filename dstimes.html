<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS Times</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Главная</a>
      <a href="dstimes.html">DS Times</a>
      <a href="#" id="logout">Выйти</a>
      <span id="user-greeting"></span>
      <label class="theme-toggle">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
      </label>
      <button id="add-post-btn" class="add-post-btn">+</button>
    </nav>
  </header>

  <main>
    <div id="post-form-container" class="popup">
      <div class="popup-content">
        <span class="close-popup">&times;</span>
        <h2>Добавить пост</h2>
        <form id="post-form">
          <input type="text" id="post-title" placeholder="Заголовок" required>
          <textarea id="post-content" placeholder="Содержание" required></textarea>
          <input type="file" id="post-image" accept="image/*">
          <button type="submit">Опубликовать</button>
          <p id="post-message"></p>
        </form>
      </div>
    </div>

    <div id="edit-post-form-container" style="display: none;">
      <h2>Редактировать пост</h2>
      <form id="edit-post-form">
        <input type="hidden" id="edit-post-id">
        <input type="text" id="edit-post-title" placeholder="Заголовок" required>
        <textarea id="edit-post-content" placeholder="Содержание" required></textarea>
        <button type="submit">Сохранить</button>
        <button type="button" id="cancel-edit">Отмена</button>
        <p id="edit-post-message"></p>
      </form>
    </div>

    <div id="posts-list"></div>
  </main>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <p id="modal-message"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
