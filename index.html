<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Roboto, Mono;
            margin: 0;
            padding: 10px;
        }
    <title>Digital Hub</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px; /* Space between text and buttons */
            color: white;
        }
        button {
            margin: 10px;
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #ffffff;
            color: black;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #696969;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <!-- Buttons are clearly below the welcome text -->
    <div>
        <button onclick="window.location.href='https://tironflap.github.io/table'">Расписание</button>
        <button onclick="window.location.href='https://tironflap.github.io/dstimes'">Новости Цш</button>
    </div>
</body>
</html>
